<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kibo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: #111; margin-bottom: 8px; }
    p { font-size: 16px; color: #666; margin-bottom: 32px; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    a {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid #e0e0e0;
      color: #111;
      transition: border-color 0.15s;
    }
    a:hover { border-color: #7c5cfc; color: #7c5cfc; }
  </style>
</head>
<body>
  <div class="logo">✦</div>
  <h1>Kibo</h1>
  <p>Build discipline. Track progress. Evolve.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="support.html">Support</a>
  </div>
</body>
</html>
