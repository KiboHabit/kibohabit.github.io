<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Signing you in to Kibo…</title>
  <style>
    html, body { margin: 0; height: 100%; background: #050508; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 16px; }
    h1 { font-size: 22px; margin: 0; letter-spacing: -0.5px; }
    p  { font-size: 15px; color: rgba(255,255,255,0.6); margin: 0; max-width: 320px; line-height: 1.5; }
    .btn { margin-top: 8px; display: inline-block; padding: 14px 28px; border-radius: 14px;
      background: #fff; color: #000; font-weight: 700; font-size: 16px; text-decoration: none; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <h1>Signing you in to Kibo…</h1>
    <p>If Kibo doesn't open automatically, tap the button below.</p>
    <a class="btn" id="openBtn" href="#">Open Kibo</a>
  </div>
  <script>
    // Firebase redirected here with the one-time sign-in code in the query string.
    // Hand the FULL current URL back to the app via its custom scheme so the app
    // can call signInWithEmailLink() with it.
    (function () {
      var link = window.location.href;
      var deep = 'kiboapp://finishSignIn?link=' + encodeURIComponent(link);
      var btn = document.getElementById('openBtn');
      btn.setAttribute('href', deep);
      // Auto-open the app. iOS may show an "Open in Kibo?" prompt the first time.
      window.location.replace(deep);
    })();
  </script>
</body>
</html>
