<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Signing you in to Kibo…</title>
  <script>
    // Build the app deep link from the current URL (which carries the one-time
    // sign-in code) and try to open the app AS EARLY AS POSSIBLE. Running here in
    // <head> gives the best shot at auto-opening before iOS throttles it.
    (function () {
      try {
        var deep = 'kiboapp://finishSignIn?link=' + encodeURIComponent(window.location.href);
        window.__kiboDeep = deep;
        window.location.href = deep;
      } catch (e) {}
    })();
  </script>
  <style>
    html, body { margin: 0; height: 100%; background: #050508; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 18px; }
    h1 { font-size: 22px; margin: 0; letter-spacing: -0.5px; }
    p  { font-size: 15px; color: rgba(255,255,255,0.6); margin: 0; max-width: 320px; line-height: 1.5; }
    .btn { margin-top: 6px; display: inline-block; padding: 18px 40px; border-radius: 16px;
      background: #fff; color: #000; font-weight: 800; font-size: 18px; text-decoration: none; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <h1>Signing you in to Kibo…</h1>
    <p>iOS may not open the app automatically — tap the button to finish signing in.</p>
    <a class="btn" id="openBtn" href="#">Open Kibo &rarr;</a>
  </div>
  <script>
    // Wire the fallback button (and retry the redirect once the body is ready, in
    // case the <head> attempt was throttled before the app could register).
    (function () {
      var deep = window.__kiboDeep || ('kiboapp://finishSignIn?link=' + encodeURIComponent(window.location.href));
      var btn = document.getElementById('openBtn');
      if (btn) btn.setAttribute('href', deep);
      setTimeout(function () { window.location.href = deep; }, 400);
    })();
  </script>
</body>
</html>
